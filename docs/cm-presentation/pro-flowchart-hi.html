<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>उज्जैन कुंभ 2028 प्रो सिस्टम फ्लोचार्ट</title>
  <style>
    :root {
      --bg: #fff7ed;
      --paper: #ffffff;
      --ink: #3d1f0f;
      --muted: #6b4d3c;
      --line: #b45309;
      --saffron: #d97706;
      --saffron-dark: #9a3412;
      --cream: #fffbf5;
      --high: #b91c1c;
      --info: #2563eb;
      --ok: #15803d;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans Devanagari", "Trebuchet MS", "Segoe UI", sans-serif;
      background: linear-gradient(155deg, var(--bg), #fffdf9);
      color: var(--ink);
      padding: 22px;
    }

    .sheet {
      max-width: 1550px;
      margin: 0 auto;
      background: var(--paper);
      border: 1px solid #f1d2b0;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(154, 52, 18, 0.16);
    }

    .hero {
      padding: 20px 24px;
      background: linear-gradient(110deg, #fff5e7 0%, #ffe3bd 55%, #ffd08a 100%);
      border-bottom: 1px solid #f4c997;
    }

    .hero h1 { margin: 0; color: var(--saffron-dark); font-size: 30px; }
    .hero p { margin: 8px 0 0; color: var(--muted); font-size: 14px; }

    .wrap { padding: 16px; overflow: auto; }
    svg {
      width: 100%;
      min-width: 1480px;
      height: auto;
      display: block;
      background: linear-gradient(180deg, #fffefc, var(--cream));
      border: 1px solid #f2dac0;
      border-radius: 14px;
    }

    .foot {
      padding: 14px 18px 20px;
      background: #fffaf3;
      border-top: 1px solid #f2dac0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="sheet">
    <div class="hero">
      <h1>उज्जैन कुंभ 2028 प्रो एंटरप्राइज सिस्टम फ्लोचार्ट</h1>
      <p>जनता के उपयोग, महिला सुरक्षा, वरिष्ठ सहायता, क्यूआर पहचान, कंट्रोल रूम ऑटोमेशन और कमांड-लेवल मॉनिटरिंग का सम्पूर्ण प्रवाह।</p>
    </div>

    <div class="wrap">
      <svg viewBox="0 0 1480 2160" role="img" aria-label="उज्जैन कुंभ 2028 हिन्दी फ्लोचार्ट">
        <defs>
          <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
            <path d="M0,0 L12,6 L0,12 z" fill="#8a4b1a" />
          </marker>
          <style>
            .phase { fill: #b45309; }
            .phaseText { font: 700 14px 'Noto Sans Devanagari', Segoe UI; fill: #fff; }
            .box { fill: #fff; stroke: #b45309; stroke-width: 2.1; rx: 12; }
            .soft { fill: #fff9f2; stroke: #d97706; stroke-width: 2.1; rx: 12; }
            .decision { fill: #fff4e5; stroke: #9a3412; stroke-width: 2.3; }
            .control { fill: #f7fbff; stroke: #2563eb; stroke-width: 2.1; rx: 12; }
            .critical { fill: #fff1f2; stroke: #b91c1c; stroke-width: 2.4; rx: 12; }
            .success { fill: #f0fdf4; stroke: #15803d; stroke-width: 2.1; rx: 12; }
            .label { font: 700 15px 'Noto Sans Devanagari', Segoe UI; fill: #3d1f0f; }
            .desc { font: 500 12px 'Noto Sans Devanagari', Segoe UI; fill: #6b4d3c; }
            .small { font: 600 11px 'Noto Sans Devanagari', Segoe UI; fill: #6b4d3c; }
            .arrow { fill: none; stroke: #8a4b1a; stroke-width: 2.4; marker-end: url(#arrow); }
            .arrowBlue { fill: none; stroke: #2563eb; stroke-width: 2.4; marker-end: url(#arrow); }
            .arrowGreen { fill: none; stroke: #15803d; stroke-width: 2.4; marker-end: url(#arrow); }
            .title { font: 800 26px 'Noto Sans Devanagari', Segoe UI; fill: #7c2d12; }
            .subtitle { font: 500 13px 'Noto Sans Devanagari', Segoe UI; fill: #7b5b49; }
          </style>
        </defs>

        <text x="740" y="42" class="title" text-anchor="middle">जनता से कमांड सेंटर तक पूरा डिजिटल प्रवाह</text>
        <text x="740" y="64" class="subtitle" text-anchor="middle">महाकाल थीम पर आधारित, सरल उपयोग और तेज समाधान के लिए डिज़ाइन</text>

        <rect x="40" y="94" width="1400" height="34" rx="7" class="phase"/>
        <text x="58" y="116" class="phaseText">चरण 1: आगमन, क्यूआर एक्सेस और सेवा चयन</text>

        <rect x="450" y="150" width="580" height="58" class="soft"/>
        <text x="740" y="174" class="label" text-anchor="middle">यात्री / श्रद्धालु / परिवार कुंभ क्षेत्र में प्रवेश करता है</text>
        <text x="740" y="196" class="desc" text-anchor="middle">घाट, प्रवेश द्वार, कियोस्क, स्वयंसेवक प्वाइंट या हेल्प डेस्क</text>

        <path d="M740 208 L740 244" class="arrow"/>
        <rect x="410" y="244" width="660" height="62" class="box"/>
        <text x="740" y="270" class="label" text-anchor="middle">कॉमन क्यूआर स्कैन या अल्टिमेट प्रो पेज खोलें</text>
        <text x="740" y="292" class="desc" text-anchor="middle">एक ही एंट्री पॉइंट से रजिस्ट्रेशन, क्यूआर पास, शिकायत, सुरक्षा और लुकअप</text>

        <path d="M740 306 L740 344" class="arrow"/>
        <polygon points="740,344 830,402 740,460 650,402" class="decision"/>
        <text x="740" y="397" class="label" text-anchor="middle">उपयोगकर्ता क्या चाहता है?</text>
        <text x="740" y="417" class="small" text-anchor="middle">पंजीकरण / लुकअप / समस्या दर्ज</text>

        <path d="M650 402 L290 402 L290 490" class="arrow"/>
        <path d="M830 402 L1190 402 L1190 490" class="arrowBlue"/>
        <path d="M740 460 L740 510" class="arrowGreen"/>

        <rect x="90" y="490" width="400" height="72" class="soft"/>
        <text x="290" y="516" class="label" text-anchor="middle">फेस + OTP पंजीकरण</text>
        <text x="290" y="538" class="desc" text-anchor="middle">नाम, फोन, रिश्तेदार फोन, भाषा, चेहरा, आश्रित सदस्य जोड़ना</text>

        <rect x="540" y="510" width="400" height="58" class="success"/>
        <text x="740" y="536" class="label" text-anchor="middle">मौजूदा पंजीकरण लुकअप</text>
        <text x="740" y="556" class="desc" text-anchor="middle">फोन से खोजें और तुरंत QR पास फिर से प्राप्त करें</text>

        <rect x="990" y="490" width="400" height="72" class="critical"/>
        <text x="1190" y="514" class="label" text-anchor="middle">समस्या / फास्ट-लेन अनुरोध</text>
        <text x="1190" y="538" class="desc" text-anchor="middle">HELP, COMPLAINT, LOST, FOUND, महिला सुरक्षा, वरिष्ठ सहायता</text>

        <rect x="40" y="620" width="1400" height="34" rx="7" class="phase"/>
        <text x="58" y="642" class="phaseText">चरण 2: सत्यापन, पहचान और QR पास</text>

        <path d="M290 562 L290 604" class="arrow"/>
        <rect x="90" y="676" width="400" height="62" class="box"/>
        <text x="290" y="702" class="label" text-anchor="middle">डेटाबेस में पंजीकरण सुरक्षित</text>
        <text x="290" y="724" class="desc" text-anchor="middle">स्थिति PENDING_OTP बनती है और OTP भेजा जाता है</text>

        <path d="M290 738 L290 780" class="arrow"/>
        <polygon points="290,780 375,836 290,892 205,836" class="decision"/>
        <text x="290" y="832" class="label" text-anchor="middle">OTP सही?</text>

        <path d="M375 836 L510 836" class="arrowGreen"/>
        <rect x="510" y="804" width="420" height="64" class="success"/>
        <text x="720" y="830" class="label" text-anchor="middle">पंजीकरण COMPLETE</text>
        <text x="720" y="852" class="desc" text-anchor="middle">QR पास बनता है, परिवार आकार और जोन डेटा के साथ</text>

        <path d="M205 836 L90 836" class="arrow"/>
        <rect x="40" y="804" width="140" height="64" class="critical"/>
        <text x="110" y="832" class="label" text-anchor="middle">OTP पुनः प्रयास</text>
        <text x="110" y="850" class="desc" text-anchor="middle">जन-सहायता जारी</text>

        <path d="M740 568 L740 676" class="arrowGreen"/>
        <rect x="540" y="676" width="400" height="62" class="success"/>
        <text x="740" y="702" class="label" text-anchor="middle">QR री-इश्यू / लुकअप</text>
        <text x="740" y="724" class="desc" text-anchor="middle">खोया पास, वापसी यात्री, या हेल्प डेस्क उपयोग के लिए</text>

        <rect x="40" y="936" width="1400" height="34" rx="7" class="phase"/>
        <text x="58" y="958" class="phaseText">चरण 3: शिकायत, सुरक्षा और टिकट निर्माण</text>

        <path d="M1190 562 L1190 614" class="arrowBlue"/>
        <rect x="990" y="676" width="400" height="68" class="box"/>
        <text x="1190" y="702" class="label" text-anchor="middle">सामान्य टिकट फ्लो</text>
        <text x="1190" y="724" class="desc" text-anchor="middle">HELP, COMPLAINT, LOST, FOUND श्रेणी और विवरण के साथ</text>

        <rect x="990" y="770" width="400" height="68" class="critical"/>
        <text x="1190" y="796" class="label" text-anchor="middle">महिला सुरक्षा फास्ट-लेन</text>
        <text x="1190" y="818" class="desc" text-anchor="middle">तुरंत उच्च प्राथमिकता, तेज प्रतिक्रिया और सुरक्षा फोकस</text>

        <rect x="990" y="864" width="400" height="68" class="critical"/>
        <text x="1190" y="890" class="label" text-anchor="middle">वरिष्ठ नागरिक सहायता फास्ट-लेन</text>
        <text x="1190" y="912" class="desc" text-anchor="middle">व्हीलचेयर, मेडिकल, मार्गदर्शन और विशेष सहायता</text>

        <path d="M1190 932 L1190 992" class="arrowBlue"/>
        <rect x="940" y="992" width="500" height="70" class="soft"/>
        <text x="1190" y="1018" class="label" text-anchor="middle">SLA और प्राथमिकता के साथ टिकट तैयार</text>
        <text x="1190" y="1040" class="desc" text-anchor="middle">ओपन स्टेटस, ऑडिट एंट्री, भाषा टैग, प्राथमिकता और कंट्रोल रूम क्यू</text>

        <rect x="40" y="1118" width="1400" height="34" rx="7" class="phase"/>
        <text x="58" y="1140" class="phaseText">चरण 4: कंट्रोल रूम कमांड सेंटर</text>

        <path d="M720 868 L720 1194" class="arrowGreen"/>
        <path d="M1190 1062 L1190 1194 L720 1194" class="arrowBlue"/>

        <rect x="440" y="1210" width="560" height="74" class="control"/>
        <text x="720" y="1238" class="label" text-anchor="middle">एकीकृत कंट्रोल रूम इनटेक</text>
        <text x="720" y="1260" class="desc" text-anchor="middle">डैशबोर्ड, लाइव क्यू, एनालिटिक्स, टीम मैनेजमेंट, ऑडिट लॉग</text>

        <path d="M720 1284 L720 1332" class="arrowBlue"/>
        <rect x="90" y="1340" width="300" height="80" class="control"/>
        <text x="240" y="1368" class="label" text-anchor="middle">उर्जेंसी प्रायोरिटी फीड</text>
        <text x="240" y="1391" class="desc" text-anchor="middle">वेट टाइम, स्टेटस, एस्केलेशन और SLA से स्कोर आधारित क्रम</text>

        <rect x="420" y="1340" width="300" height="80" class="control"/>
        <text x="570" y="1368" class="label" text-anchor="middle">ऑटो असाइन ओपन</text>
        <text x="570" y="1391" class="desc" text-anchor="middle">अनअसाइंड टिकट सीधे यूनिट और अधिकारी को मैप होते हैं</text>

        <rect x="750" y="1340" width="300" height="80" class="control"/>
        <text x="900" y="1368" class="label" text-anchor="middle">ऑटो एस्केलेशन</text>
        <text x="900" y="1391" class="desc" text-anchor="middle">SLA ड्यू केस स्वतः उच्च स्तर पर पहुंचते हैं</text>

        <rect x="1080" y="1340" width="300" height="80" class="control"/>
        <text x="1230" y="1368" class="label" text-anchor="middle">सेक्टर हीट इंटेलिजेंस</text>
        <text x="1230" y="1391" class="desc" text-anchor="middle">कौन सा जोन सबसे ज़्यादा दबाव में है, यह तुरंत दिखता है</text>

        <path d="M240 1420 L240 1490 L720 1490" class="arrowBlue"/>
        <path d="M570 1420 L570 1490 L720 1490" class="arrowBlue"/>
        <path d="M900 1420 L900 1490 L720 1490" class="arrowBlue"/>
        <path d="M1230 1420 L1230 1490 L720 1490" class="arrowBlue"/>

        <rect x="470" y="1490" width="500" height="76" class="control"/>
        <text x="720" y="1518" class="label" text-anchor="middle">डिस्पैच / असाइन / क्विक रिजॉल्व</text>
        <text x="720" y="1540" class="desc" text-anchor="middle">ऑपरेटर फील्ड यूनिट को भेजता है, नोट जोड़ता है, और जरूरत पर तुरंत क्लोज करता है</text>

        <rect x="40" y="1610" width="1400" height="34" rx="7" class="phase"/>
        <text x="58" y="1632" class="phaseText">चरण 5: फील्ड एक्शन और समाधान</text>

        <path d="M720 1566 L720 1610" class="arrow"/>
        <rect x="390" y="1666" width="660" height="72" class="soft"/>
        <text x="720" y="1692" class="label" text-anchor="middle">फील्ड यूनिट कार्रवाई करती है</text>
        <text x="720" y="1714" class="desc" text-anchor="middle">रिवर पेट्रोल, मेडिकल यूनिट, सेक्टर अधिकारी, महिला सुरक्षा टीम, लॉस्ट एंड फाउंड डेस्क</text>

        <path d="M720 1738 L720 1780" class="arrow"/>
        <polygon points="720,1780 810,1838 720,1896 630,1838" class="decision"/>
        <text x="720" y="1834" class="label" text-anchor="middle">समाधान हुआ?</text>

        <path d="M810 1838 L980 1838" class="arrowGreen"/>
        <rect x="980" y="1802" width="380" height="72" class="success"/>
        <text x="1170" y="1830" class="label" text-anchor="middle">टिकट क्लोज + ऑडिट स्टोर</text>
        <text x="1170" y="1852" class="desc" text-anchor="middle">समय, नोट, अधिकारी और कार्रवाई सभी सिस्टम में दर्ज</text>

        <path d="M630 1838 L460 1838" class="arrow"/>
        <rect x="120" y="1802" width="340" height="72" class="critical"/>
        <text x="290" y="1830" class="label" text-anchor="middle">री-डिस्पैच / एस्केलेट</text>
        <text x="290" y="1852" class="desc" text-anchor="middle">उच्च अधिकारी या नई यूनिट को रूट किया जाता है</text>

        <path d="M290 1802 L290 1702 L390 1702" class="arrow"/>

        <rect x="40" y="1940" width="1400" height="34" rx="7" class="phase"/>
        <text x="58" y="1962" class="phaseText">चरण 6: एडमिन, गवर्नेंस और परिणाम</text>

        <path d="M1170 1874 L1170 2010 L720 2010" class="arrowGreen"/>
        <path d="M720 2010 L720 2050" class="arrowGreen"/>

        <rect x="430" y="2050" width="580" height="74" class="box"/>
        <text x="720" y="2078" class="label" text-anchor="middle">एडमिन पैनल और गवर्नेंस लेयर</text>
        <text x="720" y="2100" class="desc" text-anchor="middle">बल्क डेमो डेटा, यूजर मैनेजमेंट, ऑडिट लॉग, सिस्टम स्टेटस, CM रेडी निगरानी</text>

        <text x="720" y="2148" class="subtitle" text-anchor="middle">मुख्य लाभ: जनता के लिए आसान उपयोग, पुलिस के लिए तेज समाधान, प्रशासन के लिए रियल-टाइम नियंत्रण</text>
      </svg>
    </div>

    <div class="foot">
      यह फ्लोचार्ट CM डेमो, कमांड सेंटर ब्रीफिंग, ऑपरेशनल ट्रेनिंग और प्रोजेक्ट प्रस्तुति के लिए तैयार किया गया है।
    </div>
  </div>
</body>
</html>
